apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ocr-model-cache-pvc
spec:
  accessModes:
    - ReadWriteOnce
  # Proxmox/K8s環境に存在するデフォルトのStorageClassを利用（nfsやlocal-pathなど）
  # 独自のクラスがある場合は storageClassName: <your-class> を指定します
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: winpost-ocr
  labels:
    app: winpost-ocr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: winpost-ocr
  template:
    metadata:
      labels:
        app: winpost-ocr
    spec:
      containers:
        - name: ocr
          image: ghcr.io/naganuma-tsutomu/winpost-ocr:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "1Gi"
            limits:
              memory: "4Gi"
          volumeMounts:
            # /root/.EasyOCR にモデルがダウンロードされる仕様
            - mountPath: /root/.EasyOCR
              name: model-cache
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: ocr-model-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: winpost-ocr-service
spec:
  type: NodePort
  selector:
    app: winpost-ocr
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
