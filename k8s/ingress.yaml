apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: winpost-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # CORS設定やリクエストサイズの上限などを追加する場合はここに記載します
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    # 独自ドメインを指定 (例: my-app.com や winpost.home.local)
    - host: your-domain.home.local
      http:
        paths:
          # APIルーティング (/api)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: winpost-server-service
                port:
                  number: 3000
                  
          # OCRルーティング (/ocr など) *場合によってはフロントエンド以外から呼ばれないなら露出不要
          - path: /ocr
            pathType: Prefix
            backend:
              service:
                name: winpost-ocr-service
                port:
                  number: 8000
                  
          # フロントエンドルーティング (それ以外すべて)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: winpost-client-service
                port:
                  number: 80
