# ==============================================================================
# 【このファイルはテンプレートです】
# ！！注意！！
# 実際のパスワードやIPアドレス等を記入した後は、絶対にGitHubなどのリモートリポジトリへ
# プッシュしないでください。情報漏洩の原因となります。
#
# 安全に運用するため、インフラ側のリポジトリへコピーして使用する際は
# ".gitignore" に "secrets.yaml" を追記してGitの監視対象から除外し、
# サーバー上で直接手作業で適用 (kubectl apply -f secrets.yaml) してください。
# また、stringDataの項目を使用しているため、Base64への変換は不要（平文でOK）です。
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: winpost-secrets
type: Opaque
stringData:
  # ※実際のパスワードやIPアドレスを入れてください。ローカル専用であれば平文で書ける stringData が便利です。
  # 例: postgres://winpost:winpost_dev@192.168.1.100:5432/winpost
  DATABASE_URL: "postgresql://<your_user>:<your_password>@<your_ip_address>:5432/<your_database>?schema=public"
