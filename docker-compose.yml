services:
  postgres:
    image: postgres:16-alpine
    container_name: winpost-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: winpost
      POSTGRES_USER: winpost
      POSTGRES_PASSWORD: winpost_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
