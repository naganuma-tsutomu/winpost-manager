services:
  postgres:
    image: postgres:16-alpine
    container_name: winpost-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: winpost
      POSTGRES_USER: winpost
      POSTGRES_PASSWORD: winpost_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ocr-service:
    build:
      context: ./apps/ocr
      dockerfile: Dockerfile
    container_name: winpost-ocr
    restart: unless-stopped
    ports:
      - "8000:8000"
    # EasyOCR モデルキャッシュを永続化
    volumes:
      - ocr_model_cache:/root/.EasyOCR
    environment:
      - PYTHONUNBUFFERED=1
    # GPU なし設定（CPU のみ）
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  postgres_data:
  ocr_model_cache:
